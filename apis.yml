name: Illinois Tool Works
description: >-
  Illinois Tool Works (ITW) is a Fortune 500 global multi-industrial
  manufacturer of value-added consumables and specialty equipment with related
  service businesses across automotive OEM, food equipment, test and
  measurement, electronics, welding, polymers and fluids, construction
  products, and specialty products. ITW does not publish a public API or
  developer program. This repository exists to track APIs, SDKs, and developer
  resources should they become available.
